name: no_brain_fit
description: App fitness 3 boutons — Manger / S'entraîner / Cuisiner. Zéro réflexion.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  go_router: ^13.0.0
  flutter_riverpod: ^2.5.1
  camera: ^0.11.0
  google_mlkit_barcode_scanning: ^0.12.0
  dio: ^5.4.3+1
  sqflite: ^2.3.3
  path: ^1.9.0
  geolocator: ^12.0.0
  uuid: ^4.4.2
  shared_preferences: ^2.3.1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
