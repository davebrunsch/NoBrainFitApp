user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  sendfile        on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
  gzip_min_length 1024;

  # Rate limiting
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

  # Proxy cache (for Next.js static assets)
  proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=nginx_cache:10m max_size=500m inactive=7d use_temp_path=off;

  # HTTP: serve the ACME challenge for Let's Encrypt, redirect the rest to HTTPS
  server {
    listen 80;
    server_name _;

    # Let's Encrypt webroot challenge (must stay on HTTP, no redirect)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type "text/plain";
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # Resolver for OCSP stapling (Docker's embedded DNS, forwards upstream).
  resolver 127.0.0.11 valid=60s;
  resolver_timeout 5s;

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Modern TLS only
    ssl_protocols              TLSv1.2 TLSv1.3;
    ssl_ciphers                ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers  off;
    ssl_session_cache          shared:SSL:10m;
    ssl_session_timeout        1d;
    ssl_session_tickets        off;

    # OCSP stapling (active with CA-issued certs; harmless no-op for self-signed)
    ssl_stapling           on;
    ssl_stapling_verify    on;
    ssl_trusted_certificate /etc/nginx/ssl/fullchain.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Next.js static assets — long cache
    location /_next/static/ {
      proxy_pass http://admin:3000;
      proxy_cache nginx_cache;
      proxy_cache_valid 200 365d;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # API rate limiting
    location /api/auth/signin {
      limit_req zone=login burst=5 nodelay;
      proxy_pass http://admin:3000;
      include /etc/nginx/proxy_params;
    }

    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://admin:3000;
      include /etc/nginx/proxy_params;
    }

    # Everything else
    location / {
      proxy_pass http://admin:3000;
      include /etc/nginx/proxy_params;
    }
  }
}
