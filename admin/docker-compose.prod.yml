services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Prepares schema + seeds initial data, then exits.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:   postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ADMIN_EMAIL:    ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME:     ${ADMIN_NAME:-Admin}
      SSL_MODE:       ${SSL_MODE:-}
      SSL_DOMAIN:     ${SSL_DOMAIN:-}
      SSL_EMAIL:      ${SSL_EMAIL:-}
    restart: "no"

  # Prepares the SSL volumes (permissions + self-signed bootstrap), then exits.
  ssl-init:
    image: alpine:3.20
    command: ["/bin/sh", "/ssl-init.sh"]
    environment:
      SSL_MODE:    ${SSL_MODE:-self-signed}
      SSL_DOMAIN:  ${SSL_DOMAIN:-localhost}
      SSL_EMAIL:   ${SSL_EMAIL:-}
      SSL_STAGING: ${SSL_STAGING:-false}
    volumes:
      - ./scripts/ssl-init.sh:/ssl-init.sh:ro
      - ssl_certs:/certs
      - ssl_control:/control
      - certbot_www:/var/www/certbot
    restart: "no"

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      ssl-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL:    postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL:    ${NEXTAUTH_URL}
      APP_API_TOKEN:   ${APP_API_TOKEN}
      SSL_CERT_DIR:    /certs
      SSL_CONTROL_DIR: /control
    volumes:
      - ssl_certs:/certs
      - ssl_control:/control
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      ssl-init:
        condition: service_completed_successfully
      admin:
        condition: service_started
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/proxy_params:/etc/nginx/proxy_params:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ssl_certs:/etc/nginx/ssl:ro
      - ssl_control:/control:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_cache:/var/cache/nginx

  # Let's Encrypt agent: issues on demand (job files) and auto-renews.
  certbot:
    image: certbot/certbot:latest
    restart: always
    depends_on:
      ssl-init:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ./certbot/entrypoint.sh:/entrypoint.sh:ro
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
      - ssl_certs:/certs
      - ssl_control:/control

volumes:
  pgdata:
  nginx_cache:
  ssl_certs:
  ssl_control:
  certbot_conf:
  certbot_www:
