version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-nobrainfitdb}
      POSTGRES_USER:     ${POSTGRES_USER:-nobrainfit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nobrainfit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL:      postgresql://${POSTGRES_USER:-nobrainfit}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-nobrainfitdb}
      NEXTAUTH_SECRET:   ${NEXTAUTH_SECRET:-dev-secret-change-me}
      NEXTAUTH_URL:      ${NEXTAUTH_URL:-http://localhost:3000}
      ADMIN_EMAIL:       ${ADMIN_EMAIL:-admin@nobrainfit.app}
      ADMIN_PASSWORD:    ${ADMIN_PASSWORD:-Admin1234!}
      APP_API_TOKEN:     ${APP_API_TOKEN:-dev-app-token}
    ports:
      - "3000:3000"

volumes:
  pgdata:
